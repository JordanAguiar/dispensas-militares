<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">🪖 Sistema de Dispensas - Marinha do Brasil</span>
        <div class="d-flex gap-2">
            <a th:href="@{/militares}" class="btn btn-outline-light btn-sm">Militares</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>
<div th:if="${erro}" class="alert alert-danger mx-3" th:text="${erro}"></div>
<div class="container">

    <h2 class="mb-4">Gerenciar Usuários</h2>

    <div class="card mb-4">
        <div class="card-header bg-dark text-white">Novo Usuário</div>
        <div class="card-body">
            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{username}" required />
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required />
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" th:field="*{password}" required />
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Perfil</label>
                        <select class="form-select" th:field="*{perfil}" required>
                            <option value="">Selecione...</option>
                            <option th:each="perfil : ${perfis}"
                                    th:value="${perfil}"
                                    th:text="${perfil}">
                            </option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Criar Usuário</button>
            </form>
        </div>
    </div>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Perfil</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td>
                    <span class="badge"
                          th:classappend="${u.perfil.name() == 'MODERADOR'} ? 'bg-danger' :
                                         (${u.perfil.name() == 'ADMINISTRADOR'} ? 'bg-warning text-dark' :
                                         (${u.perfil.name() == 'CONSULTOR'} ? 'bg-info text-dark' : 'bg-secondary'))"
                          th:text="${u.perfil}">
                    </span>
            </td>
            <td>
                <a th:href="@{/usuarios/deletar/{id}(id=${u.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Deseja deletar esse usuário?')">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>

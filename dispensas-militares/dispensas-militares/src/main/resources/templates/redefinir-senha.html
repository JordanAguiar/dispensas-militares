<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: #1a2535;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h2 { color: #c9a84c; text-align: center; margin-bottom: 0.5rem; }
        p.subtitle { color: rgba(255,255,255,0.4); text-align: center; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; }
        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #c9a84c;
            color: white;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .btn-salvar {
            background: linear-gradient(135deg, #c9a84c, #a8832a);
            color: #1a2535;
            font-weight: 700;
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .btn-salvar:hover { background: linear-gradient(135deg, #d4b55a, #c9a84c); }
    </style>
</head>
<body>
<div class="card">
    <h2>🔒 Nova Senha</h2>
    <p class="subtitle">Digite sua nova senha</p>

    <div th:if="${erro}" class="alert alert-danger py-2 text-center" th:text="${erro}"></div>

    <form th:action="@{/redefinir-senha}" method="post">
        <input type="hidden" name="token" th:value="${token}" />
        <div class="mb-3">
            <label class="form-label">Nova Senha</label>
            <input type="password" class="form-control" name="novaSenha"
                   placeholder="Digite sua nova senha" required />
        </div>
        <button type="submit" class="btn btn-salvar">Salvar Nova Senha</button>
    </form>
</div>
</body>
</html>

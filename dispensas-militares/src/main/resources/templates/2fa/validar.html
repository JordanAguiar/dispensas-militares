<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Validar 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: #1a2535;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        h2 { color: #c9a84c; margin-bottom: 0.5rem; }
        p.subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; }
        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 8px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #c9a84c;
            color: white;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        .btn-validar {
            background: linear-gradient(135deg, #c9a84c, #a8832a);
            color: #1a2535;
            font-weight: 700;
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .btn-validar:hover { background: linear-gradient(135deg, #d4b55a, #c9a84c); }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Autenticação 2FA</h2>
    <p class="subtitle">Digite o código do Google Authenticator</p>

    <div th:if="${param.erro}" class="alert alert-danger py-2">
        Código inválido! Tente novamente.
    </div>

    <form th:action="@{/2fa/validar}" method="post">
        <div class="mb-3">
            <label class="form-label">Código de 6 dígitos</label>
            <input type="number" class="form-control" name="codigo"
                   placeholder="000000" maxlength="6" required autofocus />
        </div>
        <button type="submit" class="btn btn-validar">Validar</button>
    </form>
</div>
</body>
</html>

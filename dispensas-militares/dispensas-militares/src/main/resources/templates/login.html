<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <meta charset="UTF-8">
    <title>Login - Sistema de Dispensas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #1a2535;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .bg-insignia {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background-image: url('/images/insignia_fuzileiros.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.08;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .insignia-top {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .insignia-top img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(180, 150, 80, 0.5));
        }

        .login-title {
            text-align: center;
            color: #c9a84c;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .form-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #c9a84c;
            color: white;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #c9a84c, #a8832a);
            color: #1a2535;
            font-weight: 700;
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #d4b55a, #c9a84c);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }

        .divider {
            border-color: rgba(255,255,255,0.1);
            margin: 1.5rem 0;
        }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="bg-insignia"></div>

<div class="login-wrapper">
    <div class="login-card">

        <div class="insignia-top">
            <img src="/images/insignia_fuzileiros.png" alt="Insignia" />
        </div>

        <h2 class="login-title">SISDIS</h2>
        <p class="login-subtitle">Corpo de Fuzileiros Navais</p>

        <div th:if="${erro}" class="alert alert-danger py-2 text-center" th:text="${erro}"></div>
        <div th:if="${mensagem}" class="alert alert-success py-2 text-center" th:text="${mensagem}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" class="form-control" name="username"
                       placeholder="Digite seu usuário" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" name="password"
                       placeholder="Digite sua senha" required />
            </div>
            <button type="submit" class="btn btn-login">Entrar</button>
        </form>

        <p class="footer-text">MARINHA DO BRASIL © 2026</p>
    </div>
</div>

</body>
</html>

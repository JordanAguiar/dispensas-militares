<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Militar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Cadastrar Novo Militar</h2>

<form th:action="@{/militares/salvar}" th:object="${militar}" method="post" class="mt-3">

    <div class="mb-3">
        <label class="form-label">NIP</label>
        <input type="text" class="form-control" th:field="*{nip}" required />
    </div>

    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" th:field="*{nome}" required />
    </div>

    <div class="mb-3">
        <label class="form-label">Posto</label>
        <input type="text" class="form-control" th:field="*{posto}" required />
    </div>

    <div class="mb-3">
        <label class="form-label">Seção</label>
        <input type="text" class="form-control" th:field="*{secao}" required />
    </div>

    <button type="submit" class="btn btn-success">Salvar</button>
    <a th:href="@{/militares}" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>

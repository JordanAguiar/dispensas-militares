<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Militares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">🪖 Sistema de Dispensas - Marinha do Brasil</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
        </form>
    </div>
</nav>
<h2>Militares Cadastrados</h2>

<form th:action="@{/militares}" method="get" class="d-flex gap-2 my-3">
    <input type="text" name="busca" class="form-control" placeholder="Buscar por nome..." th:value="${busca}">
    <button type="submit" class="btn btn-primary">Buscar</button>
    <a th:href="@{/militares}" class="btn btn-secondary">Limpar</a>
</form>

<a th:href="@{/militares/novo}" class="btn btn-success mb-3">+ Novo Militar</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>NIP</th>
        <th>Nome</th>
        <th>Posto</th>
        <th>Companhia</th>
        <th>Data Inclusão</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="militar : ${militares}">
        <td th:text="${militar.nip}"></td>
        <td th:text="${militar.nome}"></td>
        <td th:text="${militar.posto.descricao}"></td>
        <td th:text="${militar.companhia.descricao}"></td>
        <td th:text="${militar.dataInclusao}"></td>
        <td>
            <a th:href="@{/militares/deletar/{id}(id=${militar.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Deseja deletar esse militar?')">Deletar</a>
            <a th:href="@{/dispensas/militar/{id}(id=${militar.id})}"
               class="btn btn-primary btn-sm">Ver Dispensas</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>

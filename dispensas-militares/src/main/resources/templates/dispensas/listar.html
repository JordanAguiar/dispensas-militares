<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <meta charset="UTF-8">
    <title>Dispensas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">🪖 Sistema de Dispensas - Marinha do Brasil</span>
        <div class="d-flex gap-2">
            <a th:if="${#authorization.expression('hasAuthority(''ROLE_MODERADOR'')')}"
               th:href="@{/usuarios}"
               class="btn btn-outline-warning btn-sm">⚙️ Usuários</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>
<h2>Dispensas de <span th:text="${militar.nome}"></span></h2>
<p class="text-muted">NIP: <span th:text="${militar.nip}"></span></p>

<hr>

<h4>Registrar Nova Dispensa</h4>
<form th:action="@{/dispensas/salvar/{id}(id=${militar.id})}"
      th:object="${dispensa}"
      method="post"
      enctype="multipart/form-data"
      class="mb-4">

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Data Início</label>
            <input type="date" class="form-control" th:field="*{dataInicio}" required />
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Data Fim</label>
            <input type="date" class="form-control" th:field="*{dataFim}" required />
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">PDF da Dispensa</label>
            <input type="file" class="form-control" name="arquivo" accept=".pdf" />
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Observações</label>
        <textarea class="form-control" th:field="*{observacoes}" rows="2"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Registrar Dispensa</button>
    <a th:href="@{/militares}" class="btn btn-secondary">Voltar</a>

</form>

<hr>

<h4>Histórico de Dispensas</h4>

<div th:if="${#lists.isEmpty(dispensas)}" class="alert alert-info">
    Nenhuma dispensa registrada ainda.
</div>

<table th:if="${!#lists.isEmpty(dispensas)}" class="table table-striped">
    <thead>
    <tr>
        <th>Data Registro</th>
        <th>Data Início</th>
        <th>Data Fim</th>
        <th>Observações</th>
        <th>PDF</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d : ${dispensas}">
        <td th:text="${#temporals.format(d.dataHoraRegistro, 'dd/MM/yyyy HH:mm')}"></td>
        <td th:text="${#temporals.format(d.dataInicio, 'dd/MM/yyyy')}"></td>
        <td th:text="${#temporals.format(d.dataFim, 'dd/MM/yyyy')}"></td>
        <td th:text="${d.observacoes}"></td>
        <td>
            <a th:if="${d.pdf != null}"
               th:href="@{/dispensas/pdf/{id}(id=${d.id})}"
               target="_blank"
               class="btn btn-primary btn-sm">Ver PDF</a>
            <span th:if="${d.pdf == null}" class="text-muted">Sem PDF</span>
        </td>
        <td>
            <a th:href="@{/dispensas/deletar/{id}/{militarId}(id=${d.id},militarId=${militar.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Deseja deletar essa dispensa?')">Deletar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
